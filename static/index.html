<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h1, h2 {
            margin-top: 0;
            color: #222;
        }

        form {
            display: grid;
            gap: 12px;
            margin-bottom: 30px;
        }

        input, select, textarea, button {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #222;
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background: #444;
        }

        .run-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            background: #fafafa;
        }

        .run-card h3 {
            margin: 0 0 8px 0;
        }

        .actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        .delete-btn {
            background: #c62828;
        }

        .delete-btn:hover {
            background: #a61f1f;
        }

        .refresh-btn {
            margin-bottom: 20px;
            background: #1565c0;
        }

        .refresh-btn:hover {
            background: #0f4f99;
        }

        .message {
            margin-bottom: 16px;
            font-weight: bold;
        }

        .small {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Running Tracker</h1>
        <p class="small">Log your runs and view them below.</p>

        <div id="message" class="message"></div>

        <h2>Add a New Run</h2>
        <form id="runForm">
            <input type="text" id="title" placeholder="Run title" required>
            <input type="date" id="date" required>
            <input type="number" id="distance_km" placeholder="Distance (km)" step="0.1" required>
            <input type="number" id="duration_minutes" placeholder="Duration (minutes)" required>

            <select id="run_type" required>
                <option value="">Select run type</option>
                <option value="easy">Easy</option>
                <option value="tempo">Tempo</option>
                <option value="interval">Interval</option>
                <option value="long">Long</option>
                <option value="recovery">Recovery</option>
            </select>

            <textarea id="notes" placeholder="Notes (optional)"></textarea>
            <input type="number" id="age" placeholder="Age" required>

            <select id="gender" required>
                <option value="">Select gender</option>
                <option value="Men">Men</option>
                <option value="Women">Women</option>
            </select>

            <button type="submit">Add Run</button>
        </form>

        <button class="refresh-btn" onclick="loadRuns()">Refresh Runs</button>

        <h2>Saved Runs</h2>
        <div id="runsList"></div>
    </div>

    <script>
        const apiBase = "";

        async function loadRuns() {
            const runsList = document.getElementById("runsList");
            runsList.innerHTML = "<p>Loading runs...</p>";

            try {
                const response = await fetch(`${apiBase}/runs`);
                const runs = await response.json();

                if (runs.length === 0) {
                    runsList.innerHTML = "<p>No runs saved yet.</p>";
                    return;
                }

                runsList.innerHTML = "";

                runs.forEach(run => {
                    const card = document.createElement("div");
                    card.className = "run-card";

                    card.innerHTML = `
                        <h3>${run.title}</h3>
                        <p><strong>Date:</strong> ${run.date}</p>
                        <p><strong>Distance:</strong> ${run.distance_km} km</p>
                        <p><strong>Duration:</strong> ${run.duration_minutes} minutes</p>
                        <p><strong>Type:</strong> ${run.run_type}</p>
                        <p><strong>Age:</strong> ${run.age ?? "Not set"}</p>
                        <p><strong>Gender:</strong> ${run.gender ?? "Not set"}</p>
                        <p><strong>Notes:</strong> ${run.notes ? run.notes : "None"}</p>
                        <div class="actions">
                            <button onclick="window.location.href='/static/compare.html?run_id=${run.id}'">Compare Stats</button>
                            <button class="delete-btn" onclick="deleteRun(${run.id})">Delete</button>
                        </div>
                    `;

                    runsList.appendChild(card);
                });
            } catch (error) {
                runsList.innerHTML = "<p>Failed to load runs.</p>";
                console.error(error);
            }
        }

        async function deleteRun(runId) {
            if (!confirm("Are you sure you want to delete this run?")) {
                return;
            }

            try {
                const response = await fetch(`${apiBase}/runs/${runId}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    showMessage("Run deleted successfully.", "green");
                    loadRuns();
                } else {
                    showMessage("Could not delete run.", "red");
                }
            } catch (error) {
                console.error(error);
                showMessage("Error deleting run.", "red");
            }
        }

        document.getElementById("runForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const runData = {
                title: document.getElementById("title").value,
                date: document.getElementById("date").value,
                distance_km: parseFloat(document.getElementById("distance_km").value),
                duration_minutes: parseInt(document.getElementById("duration_minutes").value),
                run_type: document.getElementById("run_type").value,
                notes: document.getElementById("notes").value || null,
                age: parseInt(document.getElementById("age").value),
                gender: document.getElementById("gender").value
                
            };
            if (Number.isNaN(runData.age)) {
                showMessage("Please enter a valid age.", "red");
                return;
            }

            if (!runData.gender) {
                showMessage("Please select a gender.", "red");
                return;
            }

            try {
                const response = await fetch(`${apiBase}/runs`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(runData)
                });

                if (response.ok) {
                    document.getElementById("runForm").reset();
                    showMessage("Run added successfully.", "green");
                    loadRuns();
                } else {
                    showMessage("Failed to add run.", "red");
                }
            } catch (error) {
                console.error(error);
                showMessage("Error adding run.", "red");
            }
        });

        function showMessage(text, color) {
            const message = document.getElementById("message");
            message.textContent = text;
            message.style.color = color;

            setTimeout(() => {
                message.textContent = "";
            }, 3000);
        }

        loadRuns();
    </script>
</body>
</html>
